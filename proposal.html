<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehruu ❤️ Amna</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            max-width: 90%;
            width: 600px;
            border: 3px solid #ff69b4;
            animation: float 3s ease-in-out infinite;
            position: relative;
            z-index: 10;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .header-text {
            font-size: 1.8rem;
            color: #ff1493;
            margin-bottom: 0.5rem;
            background: #fff0f5;
            padding: 0.8rem;
            border-radius: 50px;
            display: inline-block;
        }
        
        h1 {
            color: #ff1493;
            font-size: 2.8rem;
            margin: 1rem 0;
            text-shadow: 2px 2px 4px rgba(255, 20, 147, 0.2);
            animation: sparkle 2s ease-in-out infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { text-shadow: 2px 2px 4px rgba(255,20,147,0.2); }
            50% { text-shadow: 0 0 20px #ff1493, 0 0 40px #ff69b4; }
        }
        
        .mehruu-message {
            font-size: 2.2rem;
            color: #ff1493;
            margin: 1rem 0;
            padding: 1rem;
            background: #ffe4e1;
            border-radius: 50px;
            border: 2px dashed #ff69b4;
        }
        
        .amna-note {
            font-size: 1.5rem;
            color: #c71585;
            margin: 1rem 0;
            font-style: italic;
            background: #fff0f5;
            padding: 1rem;
            border-radius: 30px;
        }
        
        .ring-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: rotate 3s ease-in-out infinite;
        }
        
        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }
        
        .message {
            font-size: 2.2rem;
            color: #ff1493;
            margin: 2rem 0;
            padding: 1.5rem;
            background: linear-gradient(135deg, #fff0f5, #ffe4e1);
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(255,105,180,0.3);
            font-weight: bold;
            border: 2px dashed #ff69b4;
        }
        
        .buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            position: relative;
            min-height: 100px;
        }
        
        .btn {
            padding: 1.2rem 3.5rem;
            font-size: 1.8rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        
        .btn-yes {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: white;
            border: 2px solid #fff;
        }
        
        .btn-yes:hover {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 30px #ff1493;
        }
        
        .btn-no {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            position: relative;
            border: 2px solid #ff69b4;
        }
        
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 1.5rem;
            animation: floatUp 4s linear infinite;
            opacity: 0.6;
        }
        
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        .success-message {
            font-size: 2.2rem;
            color: #ff1493;
            line-height: 1.8;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .success-message i {
            font-style: normal;
            display: block;
            font-size: 4rem;
            margin: 1.5rem 0;
        }
        
        .final-message {
            animation: popIn 0.5s ease-out;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .counter {
            color: #ff1493;
            margin-top: 1.5rem;
            font-size: 1.3rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.8);
            padding: 0.8rem;
            border-radius: 30px;
            display: inline-block;
        }
        
        .signature {
            margin-top: 2rem;
            font-size: 1.3rem;
            color: #ff69b4;
            border-top: 2px solid #ffb6c1;
            padding-top: 1rem;
        }
        
        @media (max-width: 500px) {
            .container {
                padding: 2rem 1rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .message {
                font-size: 1.6rem;
            }
            
            .btn {
                padding: 1rem 2rem;
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-hearts" id="floatingHearts"></div>
    
    <div class="container" id="container">
        <div class="header-text">💕 Meri Jaan Amna 💕</div>
        <div class="mehruu-message">Mehruu hun 😘</div>
        <div class="ring-icon">💍 💌 💍</div>
        
        <h1>Will You Marry Me? 💍</h1>
        
        <div class="amna-note">
            Amna ye apke liye coding ki hai mene... 💻❤️
        </div>
        
        <div class="message" id="message">Meri Jaan Amna, kya aap meri wife banogi? 💕</div>
        
        <div class="buttons" id="buttons">
            <button class="btn btn-yes" id="yesBtn" onclick="showYes()">Haan 💍</button>
            <button class="btn btn-no" id="noBtn" onclick="handleNo()">Nahi 💔</button>
        </div>
        <div class="counter" id="counter"></div>
        
        <div class="signature">
            Tumhara Mehruu 😘
        </div>
    </div>

    <script>
        let noClickCount = 0;
        const noMessages = [
            "Amna... ek baar phir soch lo 💭",
            "Please meri jaan Amna... 💕",
            "Mehruu ke liye maan jao na 🥺",
            "Meri Amna, please please please... 🙏",
            "Tumhare bina adhoora hun ✨",
            "Meri zindagi ban jao Amna 💑",
            "Mehruu tumse pyar karta hai ❤️",
            "Bas haan kar do na 💝",
            "Meri Amna... please 🥺",
            "Aakhri mauka hai yeh... maan jao 💍"
        ];

        const noButton = document.getElementById('noBtn');
        const messageDiv = document.getElementById('message');
        const container = document.getElementById('container');
        const buttonsDiv = document.getElementById('buttons');
        const counterDiv = document.getElementById('counter');

        function createFloatingHearts() {
            const heartsContainer = document.getElementById('floatingHearts');
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['💖', '💝', '💕', '💗', '💓', '💍', '💌'][Math.floor(Math.random() * 7)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = Math.random() * 3 + 3 + 's';
                heart.style.fontSize = (Math.random() * 30 + 15) + 'px';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heartsContainer.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 6000);
            }
        }

        setInterval(createFloatingHearts, 800);

        function handleNo() {
            noClickCount++;
            
            if (noClickCount <= 10) {
                const containerRect = container.getBoundingClientRect();
                const buttonRect = noButton.getBoundingClientRect();
                
                const maxX = containerRect.width - buttonRect.width - 60;
                const maxY = containerRect.height - buttonRect.height - 150;
                
                const randomX = Math.max(20, Math.min(maxX, Math.random() * maxX));
                const randomY = Math.max(80, Math.min(maxY, Math.random() * maxY));
                
                noButton.style.position = 'absolute';
                noButton.style.left = randomX + 'px';
                noButton.style.top = randomY + 'px';
                
                messageDiv.textContent = noMessages[noClickCount - 1];
                messageDiv.style.animation = 'popIn 0.4s ease-out';
                setTimeout(() => {
                    messageDiv.style.animation = '';
                }, 400);
                
                counterDiv.textContent = `💕 ${noClickCount}/10 - Amna please... 💕`;
                
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createFloatingHearts();
                    }, i * 100);
                }
            }
            
            if (noClickCount === 10) {
                messageDiv.textContent = "Amna ab toh maan hi jao... 🥺💕 Meri jaan...";
                noButton.style.display = 'none';
                counterDiv.textContent = "💝 Bas ab toh haan kar do Amna 💝";
            }
        }

        function showYes() {
            buttonsDiv.style.display = 'none';
            messageDiv.style.display = 'none';
            counterDiv.style.display = 'none';
            
            const successDiv = document.createElement('div');
            successDiv.className = 'success-message final-message';
            successDiv.innerHTML = `
                <i>💍 💌 💍</i>
                <span style="font-size: 2.5rem; color: #ff1493;">MERI JAAN AMNA! ❤️</span><br>
                <span style="font-size: 2rem; display: block; margin: 1rem 0;">
                    Mujhe tumse yahi umeed thi!
                </span>
                <span style="font-size: 2.2rem; color: #c71585; display: block; margin: 1.5rem 0;">
                    I LOVE YOU SO MUCH AMNA 💕<br>
                    Tumhara Mehruu hamesha tumhara ❤️
                </span>
                <div style="font-size: 3rem; margin-top: 1rem;">
                    💖 💍 💖 💌 💖
                </div>
                <div style="font-size: 1.8rem; margin-top: 1rem; color: #ff69b4;">
                    Mera hone ka shukriya... 🌹
                </div>
            `;
            
            container.appendChild(successDiv);
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    createFloatingHearts();
                }, i * 50);
            }
            
            document.body.style.background = 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #feada6 100%)';
        }

        window.addEventListener('resize', () => {
            if (noClickCount === 0) {
                noButton.style.position = 'relative';
                noButton.style.left = '';
                noButton.style.top = '';
            }
        });

        noButton.addEventListener('click', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
